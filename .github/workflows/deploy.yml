name: Deploy to GitHub Pages

# Fires on every commit to main - direct pushes, merged PRs, and Pages CMS
# edits alike (the CMS commits via its own GitHub App token, so its commits
# trigger push events like any other).
on:
  push:
    branches: [main]
  workflow_dispatch: # manual "deploy now" button as fallback

# Least privilege: read code, write the Pages artifact, mint the OIDC token
# that actions/deploy-pages uses. Nothing else. No secrets involved.
permissions:
  contents: read
  pages: write
  id-token: write

# Rapid successive CMS edits: newest push wins, stale builds are cancelled.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Gate the deploy on type-checking and formatting so errors or drift never
  # reach production. Uses first-party actions + built-in corepack (no new deps).
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned so a re-pointed tag can't inject code (immutable commits).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22 # package.json engines requires >=22.12.0
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm astro check
      - run: pnpm format:check

  build:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # SHA-pinned so a compromised upstream tag can't inject code.
      - uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6.1.2
        with:
          node-version: 22 # package.json engines requires >=22.12.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

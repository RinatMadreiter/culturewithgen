media:
  - name: default
    label: Images
    input: public/images
    output: /images
  - name: landing-images
    label: Landing Images
    input: src/assets/images
    output: /images

content:
  - name: landing
    label: Landing Pages
    type: collection
    path: src/content/landing
    format: json
    filename: "{primary}.json"
    view:
      primary: header.title
      fields:
        - header.title
        - header.subtitle
    fields:
      - name: seo
        label: SEO (Google title & snippet)
        type: object
        required: false
        fields:
          - name: title
            label: Search engine title
            type: string
            required: false
            description: "Shown as the clickable title in Google results (aim for ~50-60 characters). Leave empty to auto-use the hero eyebrow followed by \" | CultureWithGen\"."
          - name: description
            label: Search engine snippet
            type: text
            required: false
            description: "The grey summary text under the title in Google results (aim for ~150-160 characters). Leave empty to use the site's default description."
      - name: header
        label: Header / First Impression
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow (small label above the title)
            type: string
            required: false
          - name: title
            type: string
          - name: subtitle
            type: string
          - name: description
            label: Description (rich text)
            type: rich-text
            options:
              format: html
          - name: ctaLabel
            label: Call-to-action button label
            type: string
          - name: image
            label: Hero image
            type: object
            required: false
            fields:
              - name: src
                label: Image
                type: image
                options:
                  media: landing-images
              - name: alt
                label: Alt text
                type: string
                required: false
      - name: about
        label: About
        type: object
        fields:
          - name: title
            type: string
          - name: body
            label: About text (rich text)
            type: rich-text
            options:
              format: html
          - name: image
            label: Portrait image
            type: object
            required: false
            fields:
              - name: src
                label: Image
                type: image
                options:
                  media: landing-images
              - name: alt
                label: Alt text
                type: string
                required: false
          - name: credentials
            label: Credentials
            type: object
            list: true
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values: [business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium]
                description: "Pick a supported icon. Adding a new one requires a developer to register its SVG in src/components/icons.ts and add the name here."
              - name: text
                type: string
                required: true
      - name: offer
        label: What I Offer
        type: object
        fields:
          - name: title
            type: string
          - name: subtitle
            type: string
            required: false
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values: [business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium]
                description: "Pick a supported icon. Adding a new one requires a developer to register its SVG in src/components/icons.ts and add the name here."
              - name: text
                type: string
                required: true
      - name: whoFor
        label: Who This Is For
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values: [business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium]
                description: "Pick a supported icon. Adding a new one requires a developer to register its SVG in src/components/icons.ts and add the name here."
              - name: text
                type: string
                required: true
      - name: situations
        label: Typical Situations
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values: [business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium]
                description: "Pick a supported icon. Adding a new one requires a developer to register its SVG in src/components/icons.ts and add the name here."
              - name: text
                type: string
                required: true
      - name: format
        label: Formats
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values: [business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium]
                description: "Pick a supported icon. Adding a new one requires a developer to register its SVG in src/components/icons.ts and add the name here."
              - name: text
                type: string
                required: true
      - name: contact
        label: Contact
        type: object
        fields:
          - name: title
            type: string
          - name: text
            type: string
          - name: email
            type: string
            description: "Plain email address (e.g. hello@example.com). It is automatically split and reassembled client-side so scrapers cannot harvest it from the HTML."
          - name: location
            type: string

  - name: legal
    label: Legal Pages
    type: collection
    path: src/content/legal
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: body
        type: rich-text

media:
  - name: default
    label: Images
    input: public/images
    output: /images
  - name: landing-images
    label: Landing Images
    input: src/assets/images
    output: /images

content:
  - name: landing
    label: Landing Pages
    type: collection
    path: src/content/landing
    format: json
    filename: "{primary}.json"
    view:
      primary: header.title
      fields:
        - header.title
        - header.subtitle
    fields:
      - name: header
        label: Header / First Impression
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow (small label above the title)
            type: string
            required: false
          - name: title
            type: string
          - name: subtitle
            type: string
          - name: description
            type: text
          - name: ctaLabel
            label: Call-to-action button label
            type: string
          - name: image
            label: Hero image
            type: object
            required: false
            fields:
              - name: src
                label: Image
                type: image
                options:
                  media: landing-images
              - name: alt
                label: Alt text
                type: string
                required: false
      - name: about
        label: About
        type: object
        fields:
          - name: title
            type: string
          - name: paragraphs
            type: string
            list: true
          - name: image
            label: Portrait image
            type: object
            required: false
            fields:
              - name: src
                label: Image
                type: image
                options:
                  media: landing-images
              - name: alt
                label: Alt text
                type: string
                required: false
          - name: credentials
            label: Credentials
            type: object
            list: true
            fields:
              - name: icon
                label: Icon name
                type: string
                description: "Supported: business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium. Other names break the site build - ask a developer to add new icons."
              - name: text
                type: string
      - name: offer
        label: What I Offer
        type: object
        fields:
          - name: title
            type: string
          - name: subtitle
            type: string
            required: false
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon name
                type: string
                description: "Supported: business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium. Other names break the site build - ask a developer to add new icons."
              - name: text
                type: string
      - name: whoFor
        label: Who This Is For
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon name
                type: string
                description: "Supported: business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium. Other names break the site build - ask a developer to add new icons."
              - name: text
                type: string
      - name: situations
        label: Typical Situations
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon name
                type: string
                description: "Supported: business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium. Other names break the site build - ask a developer to add new icons."
              - name: text
                type: string
      - name: format
        label: Formats
        type: object
        fields:
          - name: title
            type: string
          - name: items
            type: object
            list: true
            fields:
              - name: icon
                label: Icon name
                type: string
                description: "Supported: business_center, communication, connect_without_contact, corporate_fare, diversity_3, feedback, forum, groups, handshake, language, location_on, mail, military_tech, psychology, record_voice_over, schedule, school, support_agent, videocam, workspace_premium. Other names break the site build - ask a developer to add new icons."
              - name: text
                type: string
      - name: contact
        label: Contact
        type: object
        fields:
          - name: title
            type: string
          - name: text
            type: string
          - name: email
            type: string
            description: "Plain email address (e.g. hello@example.com). It is automatically split and reassembled client-side so scrapers cannot harvest it from the HTML."
          - name: location
            type: string

  - name: legal
    label: Legal Pages
    type: collection
    path: src/content/legal
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: body
        type: rich-text

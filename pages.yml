media:
  folder: public/images
  public: /images

content:
  - name: landing
    label: Landing Pages
    type: file
    files:
      - label: English Landing Page
        path: src/content/landing/en.json
      - label: German Landing Page
        path: src/content/landing/de.json
    fields:
      - name: header
        label: Header / First Impression
        type: object
        fields:
          - name: title
            type: string
          - name: subtitle
            type: string
          - name: description
            type: text
      - name: about
        label: About
        type: object
        fields:
          - name: title
            type: string
          - name: paragraphs
            type: list
      - name: offer
        label: What I offer
        type: list
      - name: whoFor
        label: Who this is for
        type: list
      - name: situations
        label: Typical Situations
        type: list
      - name: format
        label: Format
        type: list
      - name: contact
        label: Contact
        type: object
        fields:
          - name: text
            type: string
          - name: email
            type: string
          - name: location
            type: string

  - name: legal
    label: Legal Pages
    type: collection
    folder: src/content/legal
    fields:
      - name: title
        type: string
        required: true
      - name: body
        type: rich-text